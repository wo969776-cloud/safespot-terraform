name: terraform-pr-check

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-pr-check.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: terraform fmt / validate / plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init -input=false

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color
        continue-on-error: true

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan \
            > plan.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');

            const fmt = '${{ steps.fmt.outcome }}';
            const init = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan = '${{ steps.plan.outcome }}';

            let planOutput = '';
            try {
              planOutput = fs.readFileSync('terraform/environments/dev/plan.txt', 'utf8');
            } catch (e) {
              planOutput = 'plan.txt not found';
            }

            if (planOutput.length > 60000) {
              planOutput = planOutput.substring(0, 60000) + '\n\n... plan output truncated ...';
            }

            const body = `## Terraform PR Check

            | Step | Result |
            |---|---|
            | fmt | ${fmt} |
            | init | ${init} |
            | validate | ${validate} |
            | plan | ${plan} |

            <details>
            <summary>Terraform Plan</summary>

            \`\`\`terraform
            ${planOutput}
            \`\`\`

            </details>
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number
            });

            const marker = '## Terraform PR Check';
            const existing = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail if checks failed
        run: |
          if [ "${{ steps.fmt.outcome }}" != "success" ]; then
            echo "terraform fmt failed"
            exit 1
          fi

          if [ "${{ steps.validate.outcome }}" != "success" ]; then
            echo "terraform validate failed"
            exit 1
          fi

          if [ "${{ steps.plan.outcome }}" != "success" ]; then
            echo "terraform plan failed"
            exit 1
          fi
