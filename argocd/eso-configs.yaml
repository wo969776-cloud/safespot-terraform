apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-configs
  namespace: argocd
  annotations:
    # Must run after external-secrets-operator (wave 1) so CRDs are available
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/project-safespot/safespot-terraform.git
    targetRevision: HEAD
    path: terraform/addons/external-secrets-operator/chart
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    # ClusterSecretStore is cluster-scoped; namespace is unused but required
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
