apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: safespot-dev-karpenter-node
  subnetSelectorTerms:
    - tags:
        kubernetes.io/cluster/safespot-dev-eks: owned
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/safespot-dev-eks: owned
  tags:
    Project: safespot
    Environment: dev
    ManagedBy: karpenter
