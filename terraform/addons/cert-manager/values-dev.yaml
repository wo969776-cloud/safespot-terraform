# Chart: cert-manager v1.16.0 (https://charts.jetstack.io)
# Status: optional - only enable if using Let's Encrypt instead of ACM
crds:
  enabled: true

replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

nodeSelector:
  role: system

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
  - key: safespot.io/dedicated
    operator: Equal
    value: system
    effect: NoSchedule

webhook:
  replicaCount: 2
  nodeSelector:
    role: system
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - key: safespot.io/dedicated
      operator: Equal
      value: system
      effect: NoSchedule

cainjector:
  replicaCount: 2
  nodeSelector:
    role: system
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - key: safespot.io/dedicated
      operator: Equal
      value: system
      effect: NoSchedule
