repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.83.0
    hooks:
      - id: terraform_fmt
        files: ^terraform/environments/dev/api-service/
        
      - id: terraform_validate
        stages: [manual]
        files: ^terraform/environments/dev/api-service/
      - id: terraform_tflint
        files: ^terraform/environments/dev/api-service/
      - id: terraform_docs
        stages: [manual]
        files: ^terraform/modules/api-service/
        args:
          - markdown
          - table
          - --output-file
          - README.md
          - .

